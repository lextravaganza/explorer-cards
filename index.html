<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorer Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:     #042729;
      --teal-mid: #0a3d40;
      --orange:   #ff4800;
      --cream:    #f8f5ee;
      --sage:     #b9cdbe;
      --lavender: #d6c2d9;
      --pink:     #fcc3dc;
      --maroon:   #46062b;
      --black:    #141414;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; }
    body { background: var(--teal); min-height: 100vh; }

    /* ══ WELCOME ══ */
    #welcome-screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #042729 0%, #0a3d40 60%, #042729 100%);
    }
    .welcome-inner { width: 100%; max-width: 460px; text-align: center; }
    .welcome-icon  { font-size: 3rem; margin-bottom: 1rem; }
    .welcome-title { font-size: 2.6rem; font-weight: 800; color: var(--cream); margin-bottom: 0.4rem; }
    .welcome-sub   { color: var(--sage); font-size: 1rem; font-weight: 300; margin-bottom: 2rem; }
    .form-box {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 1.8rem; margin-bottom: 1.2rem; text-align: left;
    }
    .form-label {
      font-size: 0.78rem; font-weight: 600; color: var(--sage);
      text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%; padding: 0.85rem 1rem; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.09);
      color: var(--cream); font-size: 1rem; font-family: 'Lexend', sans-serif;
      outline: none; margin-bottom: 1.1rem; transition: border-color 0.2s;
    }
    .form-input:last-child { margin-bottom: 0; }
    .form-input::placeholder { color: rgba(185,205,190,0.45); }
    .form-input:focus { border-color: var(--orange); }
    .start-btn {
      width: 100%; padding: 1.1rem; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--orange) 0%, var(--maroon) 100%);
      color: var(--cream); font-size: 1.1rem; font-weight: 700;
      font-family: 'Lexend', sans-serif; cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,72,0,0.35); transition: transform 0.15s;
    }
    .start-btn:hover { transform: scale(1.02); }
    .start-btn:active { transform: scale(0.97); }

    /* ══ GAME ══ */
    #game-screen {
      min-height: 100vh; display: none; flex-direction: column;
      background: linear-gradient(160deg, #042729 0%, #0a3d40 50%, #042729 100%);
    }
    .game-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.8rem; position: sticky; top: 0; z-index: 100;
      background: rgba(4,39,41,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .player-info   { display: flex; align-items: center; }
    .player-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--orange); color: var(--cream);
      font-weight: 700; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      margin-right: 10px; flex-shrink: 0;
    }
    .player-name-hdr { color: var(--cream); font-size: 1rem; font-weight: 600; }
    .completed-badge {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 6px 16px;
      color: var(--cream); font-size: 0.85rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .star { color: var(--orange); }

    .progress-wrap { padding: 0.6rem 1.8rem; }
    .progress-track { height: 5px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--pink), var(--lavender), var(--sage));
      transition: width 0.5s ease;
    }

    /* Category header row */
    .cat-header-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; padding: 0.8rem 1.5rem 0.4rem;
    }
    .cat-header-cell {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 8px 6px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .cat-header-cell img { width: 36px; height: 36px; object-fit: contain; }
    .cat-header-cell span {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; text-align: center; line-height: 1.3;
    }
    .ch-0 { background: rgba(255,72,0,0.1);   }  .ch-0 span { color: var(--orange);   }
    .ch-1 { background: rgba(185,205,190,0.1); }  .ch-1 span { color: var(--sage);     }
    .ch-2 { background: rgba(252,195,220,0.1); }  .ch-2 span { color: var(--pink);     }
    .ch-3 { background: rgba(214,194,217,0.1); }  .ch-3 span { color: var(--lavender); }

    /* All-cards grid */
    .cards-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; padding: 0.6rem 1.5rem 2rem;
    }

    /* Row divider label */
    .row-divider {
      grid-column: 1 / -1;
      font-size: 0.65rem; font-weight: 600; color: rgba(185,205,190,0.45);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.5rem 0 0.1rem; border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 4px;
    }
    .row-divider:first-child { border-top: none; margin-top: 0; }

    /* ── CARD ── */
    .card-wrap { perspective: 1200px; cursor: pointer; }
    .card-inner {
      position: relative; width: 100%; padding-bottom: 136%;
      transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
      transform-style: preserve-3d;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; border-radius: 18px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden;
      pointer-events: none;
    }
    .card-inner:not(.flipped) .card-front { pointer-events: auto; }
    .card-inner.flipped .card-back        { pointer-events: auto; }

    /* FRONT */
    .card-front {
      background: var(--teal-mid); border: 2px solid transparent;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; padding-bottom: 1rem;
    }
    .card-front::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 72%;
      background: var(--teal);
      clip-path: polygon(0 0, 100% 0, 100% 78%, 50% 100%, 0 78%);
    }
    .card-front-img {
      position: relative; z-index: 1; width: 72%; max-width: 120px;
      aspect-ratio: 1; object-fit: contain; transform: translateY(-8%); margin-bottom: 2px;
    }
    .card-cat-name {
      position: relative; z-index: 1; font-size: 0.66rem; font-weight: 700;
      text-align: center; line-height: 1.3; padding: 0 8px; margin-top: 4px;
      margin-bottom: 18px;
    }
    .card-tap-hint {
      position: absolute; bottom: 8px; left: 0; right: 0;
      text-align: center; font-size: 0.55rem; font-weight: 500;
      letter-spacing: 0.05em; color: rgba(255,255,255,0.3);
    }

    .done-check {
      position: absolute; bottom: 8px; left: 0; right: 0;
      text-align: center; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em;
    }
    .card-front.is-done { opacity: 0.5; }

    /* BACK */
    .card-back {
      transform: rotateY(180deg); display: flex;
      flex-direction: column; padding: 0.9rem;
    }
    .card-back-top {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 0.6rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .card-back-icon { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
    .card-back-cat  { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.25; }
    .card-prompt    { font-size: 0.72rem; line-height: 1.6; color: var(--black); flex: 1; font-weight: 400; }
    .card-prompt a  { color: var(--orange); }
    .mark-btn {
      width: 100%; padding: 0.55rem; border-radius: 9px; border: none;
      font-size: 0.63rem; font-weight: 700; font-family: 'Lexend', sans-serif;
      cursor: pointer; letter-spacing: 0.04em; margin-top: 0.6rem;
      transition: transform 0.12s, opacity 0.2s;
    }
    .mark-btn:hover  { transform: scale(1.02); }
    .mark-btn:active { transform: scale(0.96); }
    .mark-btn.is-done { opacity: 0.55; cursor: default; transform: none !important; }

    /* Category theming */
    .front-0 { border-color: rgba(255,72,0,0.4); }
    .front-0 .card-cat-name { color: var(--orange); }
    .front-0 .done-check    { color: var(--orange); }
    .back-0  { background: var(--cream); }
    .back-0 .card-back-cat  { color: var(--orange); }
    .btn-0   { background: var(--orange); color: var(--cream); }

    .front-1 { border-color: rgba(185,205,190,0.4); }
    .front-1 .card-cat-name { color: var(--sage); }
    .front-1 .done-check    { color: var(--sage); }
    .back-1  { background: #eef3ef; }
    .back-1 .card-back-cat  { color: #4a7c59; }
    .btn-1   { background: var(--sage); color: var(--teal); }

    .front-2 { border-color: rgba(252,195,220,0.4); }
    .front-2 .card-cat-name { color: var(--pink); }
    .front-2 .done-check    { color: #c0607a; }
    .back-2  { background: #fdf0f5; }
    .back-2 .card-back-cat  { color: var(--maroon); }
    .btn-2   { background: var(--pink); color: var(--maroon); }

    .front-3 { border-color: rgba(214,194,217,0.4); }
    .front-3 .card-cat-name { color: var(--lavender); }
    .front-3 .done-check    { color: #8b6a9a; }
    .back-3  { background: #f5f1f8; }
    .back-3 .card-back-cat  { color: #6b4f7a; }
    .btn-3   { background: var(--lavender); color: var(--maroon); }

    /* Saving indicator */
    .save-toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: rgba(4,39,41,0.95); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 10px 16px;
      color: var(--cream); font-size: 0.78rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 500; pointer-events: none;
    }
    .save-toast.show { opacity: 1; transform: translateY(0); }
    .save-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); }
    .save-dot.saving { background: var(--orange); animation: pulse 0.8s infinite; }
    .save-dot.saved  { background: #4ade80; }
    .save-dot.error  { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ══ COMPLETION ══ */
    #completion-screen {
      min-height: 100vh; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #042729, #0a3d40, #042729);
      text-align: center;
    }
    .completion-card {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px; padding: 2.5rem; max-width: 420px; width: 100%;
    }
    .trophy-emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
    .comp-title   { font-size: 2rem; font-weight: 800; color: var(--cream); margin-bottom: 0.4rem; }
    .comp-sub     { color: var(--sage); font-size: 1rem; font-weight: 300; margin-bottom: 2rem; }
    .stats-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
    .stat-box     { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 1rem; }
    .stat-num     { font-size: 2rem; font-weight: 800; color: var(--orange); }
    .stat-lbl     { font-size: 0.7rem; color: var(--sage); text-transform: uppercase; letter-spacing: 0.07em; }
    .play-again-btn {
      width: 100%; padding: 1.1rem; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--orange), var(--maroon));
      color: var(--cream); font-size: 1rem; font-weight: 700;
      font-family: 'Lexend', sans-serif; cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,72,0,0.35); transition: transform 0.15s;
    }
    .play-again-btn:hover { transform: scale(1.02); }

    /* CONFETTI */
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
    .confetti-bit { position: fixed; pointer-events: none; z-index: 9999; animation: confettiFall linear forwards; }

    @media (max-width: 700px) {
      .cards-grid, .cat-header-row { grid-template-columns: repeat(2, 1fr); }
    }

    /* Finish button */
    .finish-bar {
      padding: 1.5rem 1.5rem 2.5rem;
      display: flex; justify-content: center;
    }
    .finish-btn {
      padding: 1rem 3rem; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--orange) 0%, var(--maroon) 100%);
      color: var(--cream); font-size: 1.05rem; font-weight: 700;
      font-family: 'Lexend', sans-serif; cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,72,0,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }
    .finish-btn:hover  { transform: scale(1.03); box-shadow: 0 8px 30px rgba(255,72,0,0.45); }
    .finish-btn:active { transform: scale(0.97); }

    /* Exploration complete screen */
    #explore-complete-screen {
      min-height: 100vh; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #042729 0%, #0a3d40 50%, #042729 100%);
      text-align: center;
    }
    .explore-card {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px; padding: 3rem 2.5rem; max-width: 500px; width: 100%;
    }
    .explore-emoji  { font-size: 5rem; margin-bottom: 1.2rem; display: block; animation: floatBob 3s ease-in-out infinite; }
    @keyframes floatBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .explore-title  { font-size: 2.2rem; font-weight: 800; color: var(--cream); margin-bottom: 0.6rem; line-height: 1.15; }
    .explore-congrats { font-size: 1.1rem; color: var(--sage); font-weight: 300; margin-bottom: 2rem; line-height: 1.6; }
    .explore-congrats strong { color: var(--cream); font-weight: 700; }
    .explore-stat-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 2.2rem; }
    .explore-stat {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 1.1rem 1.5rem; min-width: 110px;
    }
    .explore-stat-num { font-size: 2.2rem; font-weight: 800; color: var(--orange); }
    .explore-stat-lbl { font-size: 0.68rem; color: var(--sage); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }
    .explore-again-btn {
      width: 100%; padding: 1rem; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--orange), var(--maroon));
      color: var(--cream); font-size: 1rem; font-weight: 700;
      font-family: 'Lexend', sans-serif; cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,72,0,0.3); transition: transform 0.15s;
    }
    .explore-again-btn:hover { transform: scale(1.02); }
  </style>
</head>
<body>

<!-- ══ WELCOME ══ -->
<div id="welcome-screen">
  <div class="welcome-inner">
    <div class="welcome-icon">🃏</div>
    <h1 class="welcome-title">Explorer Cards</h1>
    <p class="welcome-sub">Welcome to HubSpot Explorer Cards</p>
    <div class="form-box">
      <label class="form-label">Name</label>
      <input id="inp-name"  class="form-input" type="text"  placeholder="Your name">
      <label class="form-label">Email</label>
      <input id="inp-email" class="form-input" type="email" placeholder="your.email@hubspot.com">
    </div>
    <button class="start-btn" onclick="startGame()">Start Challenge</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">
  <div class="game-header">
    <div class="player-info">
      <div class="player-avatar" id="avatar-letter">?</div>
      <span class="player-name-hdr" id="hdr-name">Player</span>
    </div>
    <div class="completed-badge">
      <span class="star">★</span>
      <span id="completed-count">0</span>&nbsp;/ 20 completed
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="cat-header-row" id="cat-headers"></div>
  <div class="cards-grid"     id="cards-grid"></div>
  <div class="finish-bar">
    <button class="finish-btn" onclick="showExploreComplete()">🎉 Finish &amp; See Results</button>
  </div>
</div>

<!-- ══ EXPLORATION COMPLETE ══ -->
<div id="explore-complete-screen">
  <div class="explore-card">
    <span class="explore-emoji">🗺️</span>
    <div class="explore-title">Exploration Complete!</div>
    <p class="explore-congrats" id="explore-msg">Congrats! You completed challenges.</p>
    <div class="explore-stat-row">
      <div class="explore-stat">
        <div class="explore-stat-num" id="explore-count">0</div>
        <div class="explore-stat-lbl">Challenges<br>Completed</div>
      </div>
      <div class="explore-stat">
        <div class="explore-stat-num" id="explore-time">—</div>
        <div class="explore-stat-lbl">Time<br>Taken</div>
      </div>
    </div>
    <button class="explore-again-btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<!-- ══ COMPLETION ══ -->
<div id="completion-screen">
  <div class="completion-card">
    <span class="trophy-emoji">🏆</span>
    <div class="comp-title">Challenge Complete!</div>
    <p class="comp-sub" id="comp-msg">You crushed it.</p>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num">20</div><div class="stat-lbl">Cards Done</div></div>
      <div class="stat-box"><div class="stat-num" id="time-stat">—</div><div class="stat-lbl">Time Taken</div></div>
    </div>
    <button class="play-again-btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<!-- Toast -->
<div class="save-toast" id="save-toast">
  <div class="save-dot" id="save-dot"></div>
  <span id="save-msg">Saving…</span>
</div>

<script>
  // ─────────────────────────────────────────────────────────────
  // 🔧 PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
  // ─────────────────────────────────────────────────────────────

  // ─────────────────────────────────────────────────────────────

  const CATS = [

    { name: "Align, Adapt, and Go!",  icon: "https://cdn.bfldr.com/FZ06SLNO/at/b4qfzr85kjfs8njpqqfhgtr/HS_Pictograms_CultureCode_Align__Adapt__Go_800px.png?auto=webp&format=png" },
    { name: "Be Bold. Learn Fast.",   icon: "https://cdn.bfldr.com/FZ06SLNO/at/hz2gbr3pg7r77zp68kmfwr8t/HS_Pictograms_CultureCode_Be_Bold_Learn_Fast_800px.png?auto=webp&format=png" },
    { name: "Deliver with HEART",     icon: "https://cdn.bfldr.com/FZ06SLNO/at/gnx62nfvmw7ncwws7cbjxpz/HS_Pictograms_CultureCode_Deliver_with_Heart_800px.png?auto=webp&format=png" }

  // Columns per row: 0=Solve | 1=Align,Adapt,Go | 2=Be Bold | 3=Deliver with HEART
  const ROWS = [
    [
      { ci:0, prompt:`Read or listen to one piece of real customer feedback — and share one takeaway with your team. Here's a <a href="#" onclick="return false">treasure trove</a>.` },
      { ci:1, prompt:`Identify something you're working on where the owner or partnership isn't clear. Proactively reach out and ask for clarity.` },
      { ci:2, prompt:`Turn one mistake into a learning moment by naming what you'd do differently next time.` },
      { ci:3, prompt:`Give a HubSpotter a shout out (privately or publicly) for one way they made an impact recently.` },
    ],
    [
      { ci:0, prompt:`Pressure-test a decision or task you're working on by asking: "Would a customer thank us for this?"` },
      { ci:1, prompt:`Share the "why" behind one decision you're making this week. Offer context via Slack, voice note, Loom, or during a live meeting.` },

      { ci:3, prompt:`Think back on someone who helped you onboard at HubSpot. Check in to see how they're doing and what they're working on these days.` },
    ],
    [
      { ci:0, prompt:`Simplify one thing. Remove friction in a doc, email, process, or experience.` },
      { ci:1, prompt:`Check your calendar. Cancel, shorten, redesign, or suggest an improvement to one meeting that isn't maximizing impact.` },
      { ci:2, prompt:`Ask for direct feedback on something you're working on — actively listen and follow up with "what else do you notice?"` },
      { ci:3, prompt:`Share one thing you'd like help with. Ask others to help provide a fresh perspective.` },
    ],
    [
      { ci:0, prompt:`When debating what direction to take, ask the group: "What drives the most customer value?"` },
      { ci:1, prompt:`Reflect on one recent change and identify the upside. Train your brain to look for opportunity.` },
      { ci:2, prompt:`Pick one thing where you feel stuck. Identify one action you could take to move it forward without waiting for complete, perfect information.` },
      { ci:3, prompt:`In a meeting this week, listen 20% longer than you normally would. Don't rush to respond — aim to understand.` },
    ],
    [
      { ci:0, prompt:`Use Glean to identify a teammate who works with our customers. Introduce yourself and ask "What's one thing you're noticing our customers are struggling with right now?"` },
      { ci:1, prompt:`Experiment in 5 mins! Try a new AI tool, workflow, or approach to a daily task.` },
      { ci:2, prompt:`Start one meeting with a question instead of an opinion. ("What might we be missing?")` },
      { ci:3, prompt:`Find community by joining a <a href="https://wiki.hubspotcentral.net/spaces/COL/pages/111599088/Slack+Channel+TV+Guide" target="_blank">Slack channel that speaks to you</a>. There are 1,000+ to choose from.` },
    ]
  ];

  // All 20 cards flat
  const ALL_CARDS = ROWS.flat();

  let completedSet = new Set();
  let playerName   = '';
  let playerEmail  = '';
  let startTime    = null;
  let sessionId    = null;

  // ── Start ──
  function startGame() {
    playerName  = document.getElementById('inp-name').value.trim()  || 'Explorer';
    playerEmail = document.getElementById('inp-email').value.trim() || '';
    startTime   = Date.now();
    sessionId   = `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
    completedSet = new Set();

    document.getElementById('hdr-name').textContent      = playerName;
    document.getElementById('avatar-letter').textContent = playerName[0].toUpperCase();
    document.getElementById('welcome-screen').style.display = 'none';

    const gs = document.getElementById('game-screen');
    gs.style.display       = 'flex';
    gs.style.flexDirection = 'column';

    renderCatHeaders();
    renderAllCards();
    updateProgress();
  }

  // ── Category header row ──
  function renderCatHeaders() {
    document.getElementById('cat-headers').innerHTML = CATS.map((cat, i) => `
      <div class="cat-header-cell ch-${i}">
        <img src="${cat.icon}" alt="${cat.name}" onerror="this.style.opacity=0">
        <span>${cat.name}</span>
      </div>
    `).join('');
  }

  // ── All 20 cards ──
  function renderAllCards() {
    const grid = document.getElementById('cards-grid');
    let html = '';
    ROWS.forEach((row, rowIdx) => {
      html += `<div class="row-divider">Row ${rowIdx + 1}</div>`;
      row.forEach((card, col) => {
        const idx  = rowIdx * 4 + col;
        const cat  = CATS[card.ci];
        const ci   = card.ci;
        const done = completedSet.has(idx);
        html += `
          <div class="card-wrap">
            <div class="card-inner${done ? ' flipped' : ''}" id="inner-${idx}">
              <div class="card-face card-front front-${ci}${done ? ' is-done' : ''}" onclick="flipCard(${idx})">
                <img class="card-front-img" src="${cat.icon}" alt="${cat.name}" onerror="this.style.opacity=0">
                <span class="card-cat-name">${cat.name}</span>
                ${done
                  ? `<span class="done-check">✓ Completed</span>`
                  : `<span class="card-tap-hint">Tap to reveal challenge</span>`}
              </div>
              <div class="card-face card-back back-${ci}">
                <div class="card-back-top">
                  <img class="card-back-icon" src="${cat.icon}" alt="" onerror="this.style.opacity=0">
                  <span class="card-back-cat">${cat.name}</span>
                </div>
                <p class="card-prompt">${card.prompt}</p>
                <button
                  class="mark-btn btn-${ci}${done ? ' is-done' : ''}"
                  onclick="markDone(event,${idx})"
                  ${done ? 'disabled' : ''}
                >${done ? '✓ Completed' : 'Mark Complete'}</button>
              </div>
            </div>
          </div>
        `;
      });
    });
    grid.innerHTML = html;
  }

  // ── Flip ──
  function flipCard(idx) {
    // Only flip if clicking the front face directly (not a button)
    const inner = document.getElementById(`inner-${idx}`);
    if (inner && !inner.classList.contains('flipped')) {
      inner.classList.add('flipped');
    } else if (inner && inner.classList.contains('flipped')) {
      inner.classList.remove('flipped');
    }
  }

  // ── Mark done ──
  function markDone(e, idx) {
    e.preventDefault();
    e.stopPropagation();
    if (completedSet.has(idx)) return;
    completedSet.add(idx);

    const inner = document.getElementById(`inner-${idx}`);
    if (inner) {
      const btn = inner.querySelector('.mark-btn');
      if (btn) { btn.textContent = '✓ Completed'; btn.disabled = true; btn.classList.add('is-done'); }
      setTimeout(() => {
        inner.classList.remove('flipped');
        const front = inner.querySelector('.card-front');
        if (front) {
          front.classList.add('is-done');
          const hint = front.querySelector('.card-tap-hint');
          if (hint) hint.remove();
          if (!front.querySelector('.done-check')) {
            const chk = document.createElement('span');
            chk.className = 'done-check';
            chk.textContent = '✓ Completed';
            front.appendChild(chk);
          }
        }
      }, 300);
    }

    updateProgress();

    // Save progress snapshot to sheet
    const card = ALL_CARDS[idx];
    sendToSheet({
      type:           'progress',
      sessionId:      sessionId,
      name:           playerName,
      email:          playerEmail,
      cardsCompleted: completedSet.size,
      totalCards:     20,
      lastCardIndex:  idx,
      lastCategory:   CATS[card.ci].name,
      timestamp:      new Date().toISOString(),
    });

    if (completedSet.size === 20) setTimeout(showExploreComplete, 900);
  }

  // ── Progress bar ──
  function updateProgress() {
    const n = completedSet.size;
    document.getElementById('completed-count').textContent = n;
    document.getElementById('progress-bar').style.width   = `${(n / 20) * 100}%`;
  }

  // ── Completion ──
  function showCompletion() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    launchConfetti();
    document.getElementById('game-screen').style.display       = 'none';
    document.getElementById('completion-screen').style.display = 'flex';
    document.getElementById('comp-msg').textContent = `${playerName}, you crushed all 20 challenges!`;
    document.getElementById('time-stat').textContent = `${Math.floor(elapsed/60)}m ${elapsed%60}s`;

    // Final snapshot to sheet
    sendToSheet({
      type:           'final',
      sessionId:      sessionId,
      name:           playerName,
      email:          playerEmail,
      cardsCompleted: completedSet.size,
      totalCards:     20,
      timeSeconds:    elapsed,
      completedCards: [...completedSet].join(','),
      timestamp:      new Date().toISOString(),
    });
  }

  function showExploreComplete() {
    const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
    launchConfetti();
    document.getElementById('game-screen').style.display            = 'none';
    document.getElementById('explore-complete-screen').style.display = 'flex';
    document.getElementById('explore-count').textContent = completedSet.size;
    document.getElementById('explore-time').textContent  = elapsed > 0 ? `${Math.floor(elapsed/60)}m ${elapsed%60}s` : '—';
    document.getElementById('explore-msg').innerHTML =
      `Congrats, <strong>${playerName}</strong>! You completed <strong>${completedSet.size}</strong> challenge${completedSet.size !== 1 ? 's' : ''}!`;

    // Send final snapshot to sheet
    sendToSheet({
      type:           'final',
      sessionId:      sessionId,
      name:           playerName,
      email:          playerEmail,
      cardsCompleted: completedSet.size,
      totalCards:     20,
      timeSeconds:    elapsed,
      completedCards: [...completedSet].join(','),
      timestamp:      new Date().toISOString(),
    });
  }

  function restartGame() {
    document.getElementById('completion-screen').style.display          = 'none';
    document.getElementById('explore-complete-screen').style.display    = 'none';
    document.getElementById('welcome-screen').style.display             = 'flex';
    document.getElementById('inp-name').value  = '';
    document.getElementById('inp-email').value = '';
    completedSet = new Set();
  }

  // ── Google Sheets via Apps Script ──
  function sendToSheet(data) {
    if (!SHEET_URL || SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;

    showToast('saving');
    fetch(SHEET_URL, {
      method: 'POST',
      mode:   'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })
    .then(() => showToast('saved'))
    .catch(() => showToast('error'));
  }

  // ── Toast ──
  let toastTimer = null;
  function showToast(state) {
    const toast = document.getElementById('save-toast');
    const dot   = document.getElementById('save-dot');
    const msg   = document.getElementById('save-msg');
    dot.className = `save-dot ${state}`;
    if (state === 'saving') { msg.textContent = 'Saving to sheet…'; }
    if (state === 'saved')  { msg.textContent = 'Saved ✓'; }
    if (state === 'error')  { msg.textContent = 'Save failed — check URL'; }
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Confetti ──
  function launchConfetti() {
    const colors = ['#ff4800','#f8f5ee','#fcc3dc','#d6c2d9','#b9cdbe','#46062b'];
    for (let i = 0; i < 90; i++) {
      const el   = document.createElement('div');
      el.className = 'confetti-bit';
      const size = 7 + Math.random() * 9;
      el.style.cssText = `
        left:${Math.random()*100}vw; top:-20px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'3px'};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*.9}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }
</script>
</body>
</html>
